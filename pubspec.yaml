name: loqx_arena
description: "The Free Fire Max Esports Platform."
publish_to: 'none' 

version: 1.0.3+4

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.3.1
  # Icons & UI
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_chat_bubble: ^2.0.2
  
  # Firebase Core
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.1
  
  # Week 4: Notifications & Payments (NEW)
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.1.0
  razorpay_flutter: ^1.3.6

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.0
  shared_preferences: ^2.2.3
  cloud_functions: ^5.6.2
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  dio: ^5.9.1
  path_provider: ^2.1.5
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  change_app_package_name: ^1.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/BR.jpg
    - assets/CS.jpeg

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"